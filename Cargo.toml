[workspace]
members = ["moof-fabric", "moof-lang", "."]

[package]
name = "moof"
version = "0.1.0"
edition = "2024"

[dependencies]
moof-fabric = { path = "moof-fabric" }
moof-lang = { path = "moof-lang" }
serde = { version = "1", features = ["derive"] }
bincode = "1"
sha2 = "0.10"
ratatui = "0.29"
crossterm = "0.28"
libloading = "0.8"
eframe = "0.31"

[[bin]]
name = "moof-new"
path = "src/bin/moof_new.rs"
