[workspace]
members = ["moof-fabric", "moof-lang", "moof-server", "."]

[package]
name = "moof"
version = "0.2.0"
edition = "2024"
description = "The moof objectspace fabric — a shared data substrate."

[dependencies]
moof-fabric = { path = "moof-fabric" }
moof-server = { path = "moof-server" }

[[bin]]
name = "moof-server"
path = "src/bin/moof_server.rs"

[[bin]]
name = "moof-repl"
path = "src/bin/moof_repl.rs"
