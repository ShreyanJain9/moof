# moof.toml — image manifest
#
# everything moof loads is declared here. no manifest = blank VM.
# edit this file to add/remove types, capabilities, source files.

[image]
name = "moof"
path = ".moof/store"

[types]
# structural plugins — registered on every vat's heap. every plugin
# is a cdylib loaded at runtime; nothing is baked into moof-cli.
#   "builtin:X"           → target/<profile>/libmoof_plugin_X.{dylib,so,dll}
#   "path/to/plugin.dylib" → literal path, for external plugins
core = "builtin:core"
numeric = "builtin:numeric"
collections = "builtin:collections"
effects = "builtin:effects"
block = "builtin:block"
json = "builtin:json"
vec3 = "builtin:vec3"

# external dylib type plugin example (build via:
# cd examples/type-plugin && cargo build --release
# then uncomment below to exercise it):
color = "examples/type-plugin/target/release/libmoof_color_plugin.dylib"

[capabilities]
# each capability gets its own vat. accessed via FarRef → Act.
console = "builtin:console"
clock   = "builtin:clock"
file    = "builtin:file"
random  = "builtin:random"

[sources]
# moof files eval'd into the image, in order.
files = [
  # kernel — language core, loaded first
  "lib/kernel/bootstrap.moof",
  "lib/kernel/protocols.moof",
  "lib/kernel/identity.moof",
  "lib/kernel/types.moof",
  "lib/kernel/error.moof",
  "lib/kernel/showable.moof",
  "lib/kernel/equatable.moof",

  # data — value types + their protocols
  "lib/data/comparable.moof",
  "lib/data/numeric.moof",
  "lib/data/iterable.moof",
  "lib/data/indexable.moof",
  "lib/data/callable.moof",
  "lib/data/range.moof",
  "lib/data/act.moof",
  "lib/data/option.moof",
  "lib/data/builder.moof",
  "lib/data/set.moof",
  "lib/data/bag.moof",
  "lib/data/hashable.moof",
  "lib/data/reference.moof",

  # server: defserver needs Act/update; reactive + workspace need defserver.
  "lib/tools/server.moof",

  # flow — transformation + matching
  "lib/flow/transducer.moof",
  "lib/flow/stream.moof",
  "lib/flow/reactive.moof",
  "lib/flow/pattern.moof",

  # tools — meta and composition
  "lib/tools/inspect.moof",
  "lib/tools/query.moof",
  "lib/tools/workspace.moof",
  "lib/tools/test.moof",
]

[grants]
# which capabilities each context can access.
# the REPL gets these as FarRef bindings.
repl = ["console", "clock", "file", "random"]
